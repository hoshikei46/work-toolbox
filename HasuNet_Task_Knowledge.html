                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [
                                { text: `添付されたPDF資料を読み取り、学校事務職員向けの業務マニュアルとして整理してください。必ず以下のJSONフォーマットのみを返してください。Markdownの修飾（\`\`\`json 等）は含めないでください。\n\n{\n"title": "資料に基づく適切なタイトル",\n"category": "その他",\n"timing": "不定期",\n"stakeholders": "関係先が分かれば記載、なければ空文字",\n"content": "PDFの内容を箇条書き等で分かりやすく整理した具体的な手順や解説（必ず文字列で返してください）"\n}` },
                                { inline_data: { mime_type: "application/pdf", data: base64Data } }
                            ] }] })
                        });
                        const d = await res.json();
                        if (d.error) throw new Error(d.error.message);
                        if (d.candidates?.[0]?.content?.parts?.[0]?.text) {
                            let rText = d.candidates[0].content.parts[0].text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                            const parsed = JSON.parse(rText);

                            // ★ 型安全変換: AIが配列やオブジェクトを返しても文字列に変換する
                            const safeTitle = toSafeString(parsed.title, 'PDFマニュアル');
                            const safeCategory = toSafeString(parsed.category, '');
                            const safeTiming = toSafeString(parsed.timing, '');
                            const safeStakeholders = toSafeString(parsed.stakeholders, '');
                            const safeContent = toSafeString(parsed.content, '');

                            setFormData({ 
                                visibility: 'public', 
                                title: safeTitle || 'PDFマニュアル', 
                                category: categories.includes(safeCategory) ? safeCategory : categories[0], 
                                timing: timings.includes(safeTiming) ? safeTiming : timings[0], 
                                stakeholders: stakeholdersList.includes(safeStakeholders) ? safeStakeholders : '', 
                                fileLocation: '', 
                                content: safeContent, 
                                needsAttention: false, 
                                selectedTags: [] 
                            });
                            setItemModal({ isOpen: true, itemId: null });
                        } else alert("AIからの応答がありませんでした。");
                    } catch (err) { console.error(err); alert("PDFの読み込みに失敗しました。\n" + err.message); } 
                    finally { setIsAILoading(false); e.target.value = ''; }
                }; reader.readAsDataURL(file);
            };

            // ★ Fix 2: 手動入力からの AI文章整理 - 型安全な処理
            const handleAIAssist = async () => {
                const apiKey = await getApiKey();
                if (!apiKey) return alert("右上の「⚙️AI設定」からAPIキーを登録してください。");
                if (!formData.content && !formData.title) return alert("タイトルまたは手順・内容を入力してください。");
                setIsAILoading(true);
                try {
                    const prompt = `以下の学校事務マニュアルの入力内容を分析し、①文章を分かりやすく整理・推敲し、②最も適切な「分野」「時期」「関係先」を選び、③適切な「タグ」を選んでください。必ず以下のJSONフォーマットのみを返してください。Markdown修飾(\`\`\`json 等)は含めないでください。

【選択肢リスト】
・分野: ${categories.join(', ')}
・時期: ${timings.join(', ')}
・タグ: ${tagsMaster.join(', ')}
・関係先: ${stakeholdersList.join(', ')}

【入力内容】
タイトル: ${formData.title}
内容: ${formData.content}

【出力JSONフォーマット】
{
  "content": "整理された分かりやすい本文（箇条書きなどを活用、元の意味は変えない、必ず文字列で返してください）",
  "category": "選択した分野",
  "timing": "選択した時期",
  "tags": ["タグ1", "タグ2"],
  "stakeholders": "選択した関係先（該当なしの場合は空文字）"
}`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const d = await res.json();
                    if (d.error) throw new Error(d.error.message);
                    if (d.candidates?.[0]?.content?.parts?.[0]?.text) {
                        let rText = d.candidates[0].content.parts[0].text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                        const parsed = JSON.parse(rText);

                        // ★ 型安全変換
                        const safeContent = toSafeString(parsed.content, '');
                        const safeCategory = toSafeString(parsed.category, '');
                        const safeTiming = toSafeString(parsed.timing, '');
                        const safeStakeholders = toSafeString(parsed.stakeholders, '');
                        const safeTags = Array.isArray(parsed.tags) 
                            ? parsed.tags.map(t => toSafeString(t)).filter(t => tagsMaster.includes(t))
                            : [];

                        setFormData(prev => ({ 
                            ...prev, 
                            content: safeContent || prev.content,
                            category: categories.includes(safeCategory) ? safeCategory : prev.category,
                            timing: timings.includes(safeTiming) ? safeTiming : prev.timing,
                            stakeholders: stakeholdersList.includes(safeStakeholders) ? safeStakeholders : prev.stakeholders,
                            selectedTags: safeTags.length > 0 ? safeTags : prev.selectedTags
                        }));
                    } else alert("AI応答なし");
                } catch (e) { alert("エラー: " + e.message); }
                setIsAILoading(false);
            };

            const handleAISummary = async (item) => {
                const apiKey = await getApiKey();
                if (!apiKey) return alert("右上の「⚙️AI設定」からグループのAPIキーを登録してください。");
                if (!item.content) return alert("要約する本文がありません。");
                setSummaryConfig({ isOpen: true, loading: true, text: '', title: item.title });
                try {
                    const contentStr = toSafeString(item.content);
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `以下の業務マニュアルを、新人職員でもパッと理解できるように3行程度の箇条書きで分かりやすく要約・解説してください。\n\n【${item.title}】\n${contentStr}` }] }] })
                    });
                    const d = await res.json();
                    if (d.candidates?.[0]?.content?.parts?.[0]?.text) setSummaryConfig({ isOpen: true, loading: false, text: d.candidates[0].content.parts[0].text, title: item.title });
                    else { setSummaryConfig({ isOpen: false }); alert("AI応答なし"); }
                } catch (e) { setSummaryConfig({ isOpen: false }); alert("エラー: " + e.message); }
            };

            const handleDuplicate = (item) => {
                setFormData({ ...item, visibility: 'private', title: item.title + ' (コピー)' });
                setItemModal({ isOpen: true, itemId: null });
            };

            // ★ 削除確認: { itemId, inputValue, timerId }
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const startDeleteConfirm = (item) => {
                // 既存のタイマーをクリア
                if (deleteConfirm?.timerId) clearTimeout(deleteConfirm.timerId);
                const timerId = setTimeout(() => {
                    setDeleteConfirm(null);
                }, 10000); // 10秒でキャンセル
                setDeleteConfirm({ itemId: item.id, itemVisibility: item.visibility, itemTitle: item.title, inputValue: '', timerId });
            };

            const cancelDeleteConfirm = () => {
                if (deleteConfirm?.timerId) clearTimeout(deleteConfirm.timerId);
                setDeleteConfirm(null);
            };

            const handleDeleteKnowledge = () => {
                if (!deleteConfirm) return;
                const { itemId, itemVisibility } = deleteConfirm;
                if (deleteConfirm?.timerId) clearTimeout(deleteConfirm.timerId);
                db.collection(getColPath(cityId, schoolId, userId, 'knowledge', itemVisibility)).doc(itemId).delete();
                setDeleteConfirm(null);
            };

            // 削除確認の必要入力キーワード（タイトル先頭4文字、4文字未満の場合はタイトル全体）
            const getDeleteKeyword = (title) => title.length >= 4 ? title.slice(0, 4) : title;

            const displayedItems = [...knowledges.public, ...knowledges.school, ...knowledges.private].filter(i => (!filterAttentionOnly||i.needsAttention) && (!filterCategory||i.category===filterCategory) && (!filterTiming||i.timing===filterTiming) && (!filterTag||(Array.isArray(i.selectedTags)&&i.selectedTags.includes(filterTag))) && (!searchQuery||i.title?.includes(searchQuery)||toSafeString(i.content).includes(searchQuery)));

            return (
                <div className="space-y-6 pb-32 animate-fade-in max-w-5xl mx-auto relative">
                    
                    {isAILoading && !itemModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] print-hidden">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center">
                                <div className="text-5xl animate-bounce mb-4">🤖</div>
                                <h3 className="font-black text-xl text-slate-800 mb-2">AIが読み込んでいます...</h3>
                                <p className="text-slate-500 font-medium">マニュアルを自動作成しています。しばらくお待ちください。</p>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col sm:flex-row justify-between items-center gap-4 print-hidden">
                        <div className="flex gap-2 w-full sm:w-auto">
                            <input type="file" accept=".xlsx, .xls" ref={fileInputRef} onChange={importExcel} className="hidden" />
                            <button onClick={()=>fileInputRef.current.click()} className="bg-slate-200 font-bold px-4 py-2.5 rounded-xl text-sm">⬆️ Excel読込</button>

                            {/* ★ エクスポートドロップダウン */}
                            <div className="relative" ref={exportMenuRef}>
                                <button
                                    onClick={() => setShowExportMenu(v => !v)}
                                    className="bg-slate-200 hover:bg-slate-300 font-bold px-4 py-2.5 rounded-xl text-sm flex items-center gap-1"
                                >
                                    ⬇️ エクスポート <span className="text-xs">{showExportMenu ? '▲' : '▼'}</span>
                                </button>
                                {showExportMenu && (
                                    <div className="absolute left-0 top-full mt-1 bg-white border-2 border-slate-200 rounded-2xl shadow-xl z-30 min-w-[220px] overflow-hidden">
                                        <div className="px-4 py-2 bg-slate-50 border-b border-slate-200">
                                            <p className="text-xs font-black text-slate-500 tracking-wide">エクスポート形式を選択</p>
                                        </div>
                                        {/* Excel */}
                                        <button
                                            onClick={() => { exportExcel(); setShowExportMenu(false); }}
                                            className="w-full text-left px-4 py-3 hover:bg-emerald-50 flex items-start gap-3 border-b border-slate-100"
                                        >
                                            <span className="text-xl mt-0.5">📊</span>
                                            <div>
                                                <div className="font-black text-sm text-slate-800">Excel (.xlsx)</div>
                                                <div className="text-xs text-slate-500 font-bold">全件 · 再インポート対応</div>
                                            </div>
                                        </button>
                                        {/* PDF 全件 */}
                                        <button
                                            onClick={() => {
                                                const all = [...knowledges.public, ...knowledges.school, ...knowledges.private];
                                                if (all.length === 0) { alert('エクスポートするナレッジがありません'); return; }
                                                onPrintAll(all);
                                                setShowExportMenu(false);
                                            }}
                                            className="w-full text-left px-4 py-3 hover:bg-blue-50 flex items-start gap-3 border-b border-slate-100"
                                        >
                                            <span className="text-xl mt-0.5">📄</span>
                                            <div>
                                                <div className="font-black text-sm text-slate-800">PDF · 全件</div>
                                                <div className="text-xs text-slate-500 font-bold">表紙付き一括出力 ({[...knowledges.public, ...knowledges.school, ...knowledges.private].length}件)</div>
                                            </div>
                                        </button>
                                        {/* PDF フィルター済み */}
                                        <button
                                            onClick={() => {
                                                if (displayedItems.length === 0) { alert('表示中のナレッジがありません'); return; }
                                                onPrintAll(displayedItems);
                                                setShowExportMenu(false);
                                            }}
                                            className="w-full text-left px-4 py-3 hover:bg-blue-50 flex items-start gap-3"
                                        >
                                            <span className="text-xl mt-0.5">🔍</span>
                                            <div>
                                                <div className="font-black text-sm text-slate-800">PDF · 表示中のみ</div>
                                                <div className="text-xs text-slate-500 font-bold">現在のフィルター結果 ({displayedItems.length}件)</div>
                                            </div>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        <div className="flex gap-2 w-full sm:w-auto flex-col sm:flex-row">
                            <input type="file" accept="application/pdf" ref={pdfInputRef} onChange={handlePdfUpload} className="hidden" />
                            <button onClick={() => pdfInputRef.current.click()} className="bg-purple-600 text-white font-black px-6 py-3.5 rounded-2xl shadow-lg hover:bg-purple-700 transition hover:-translate-y-0.5">
                                📄 PDFから自動生成
                            </button>
                            <button onClick={() => { setFormData({ visibility: 'public', title: '', category: categories[0], timing: timings[0], stakeholders: '', fileLocation: '', content: '', needsAttention: false, selectedTags: [] }); setItemModal({ isOpen: true, itemId: null }); }} className="bg-emerald-600 text-white font-black px-6 py-3.5 rounded-2xl w-full sm:w-auto shadow-lg hover:-translate-y-0.5">
                                ＋ マニュアル追加
                            </button>
                        </div>
                    </div>

                    <div className="bg-white p-4 rounded-3xl shadow-sm border flex flex-wrap gap-3 print-hidden">
                        <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="🔍 検索" className="flex-1 p-3 border-2 rounded-xl font-bold bg-slate-50 min-w-[200px]" />
                        <select value={filterCategory} onChange={e=>setFilterCategory(e.target.value)} className="p-3 border-2 rounded-xl font-bold bg-slate-50"><option value="">全分野</option>{categories.map(c=><option key={c}>{c}</option>)}</select>
                        <select value={filterTiming} onChange={e=>setFilterTiming(e.target.value)} className="p-3 border-2 rounded-xl font-bold bg-slate-50"><option value="">全時期</option>{timings.map(t=><option key={t}>{t}</option>)}</select>
                        <select value={filterTag} onChange={e=>setFilterTag(e.target.value)} className="p-3 border-2 rounded-xl font-bold bg-slate-50"><option value="">全タグ</option>{tagsMaster.map(t=><option key={t}>{t}</option>)}</select>
                    </div>
                    <div className="flex items-center mt-3 print-hidden">
                        <label className="flex items-center cursor-pointer text-sm font-bold text-slate-600 bg-amber-50 px-4 py-2 rounded-xl border border-amber-200"><input type="checkbox" checked={filterAttentionOnly} onChange={(e) => setFilterAttentionOnly(e.target.checked)} className="mr-2 w-4 h-4 accent-amber-500" />⚠️ 要確認・変更あり のみ表示</label>
                    </div>

                    <div className="grid gap-4">
                        {displayedItems.length === 0 && <p className="text-center py-12 text-slate-400 font-bold border-2 border-dashed rounded-3xl print-hidden">一致するマニュアルがありません</p>}
                        {displayedItems.map(item => {
                            const vis = VIS_CONF[item.visibility || 'public'];
                            const safeContent = toSafeString(item.content);
                            const safeTags = Array.isArray(item.selectedTags) ? item.selectedTags : [];
                            const isConfirming = deleteConfirm?.itemId === item.id;
                            const keyword = getDeleteKeyword(item.title);
                            const canDelete = isConfirming && deleteConfirm.inputValue === keyword;
                            return (
                                <div key={item.id} className={`p-6 rounded-3xl border-2 bg-white shadow-sm transition-all ${isConfirming ? 'border-red-300 shadow-red-100' : 'hover:border-emerald-300'}`}>
                                    <div className="flex flex-col sm:flex-row justify-between items-start mb-4 gap-2">
                                        <div>
                                            <div className="flex flex-wrap gap-2 mb-2">
                                                <span className={`text-[11px] font-black px-2 py-1 rounded-md ${vis.bg} ${vis.text}`}>{vis.label}</span>
                                                <span className="bg-slate-100 px-2 py-1 rounded-md text-xs font-bold">{item.category}</span>
                                                <span className="bg-slate-100 px-2 py-1 rounded-md text-xs font-bold">📅 {item.timing}</span>
                                                {safeTags.map(t => <span key={t} className="bg-slate-200 px-2 py-1 rounded-md text-xs font-bold text-slate-600">#{t}</span>)}
                                            </div>
                                            <h3 className="text-xl font-black">{item.title}</h3>
                                        </div>
                                        <div className="flex flex-wrap gap-2 shrink-0 print-hidden">
                                            <button onClick={() => handleAISummary(item)} className="px-3 py-1.5 text-xs font-bold bg-purple-100 text-purple-700 hover:bg-purple-200 rounded border border-purple-200 shadow-sm" title="AIが3行で解説">🤖 AI要約</button>
                                            <button onClick={() => handleDuplicate(item)} className="px-3 py-1.5 text-xs font-bold bg-slate-100 text-slate-700 hover:bg-slate-200 rounded" title="自分用に複製して編集">📋 複製</button>
                                            <button onClick={() => onPrint(item)} className="px-3 py-1.5 text-xs font-bold bg-blue-50 text-blue-600 rounded border border-blue-200">🖨️ 印刷</button>
                                            <button onClick={() => {
                                                const itemData = {...item, originalVisibility: item.visibility||'public'};
                                                setFormData(itemData);
                                                setEditOrigin({...item}); // 編集前の状態を保存
                                                setShowSaveConfirm(false);
                                                setItemModal({isOpen:true, itemId:item.id});
                                            }} className="px-3 py-1.5 text-xs font-bold bg-slate-100 rounded">✏️</button>
                                            {/* ★ 削除ボタン: 確認中は「キャンセル」に変化 */}
                                            {isConfirming
                                                ? <button onClick={cancelDeleteConfirm} className="px-3 py-1.5 text-xs font-bold bg-slate-200 text-slate-600 hover:bg-slate-300 rounded border border-slate-300">✕ キャンセル</button>
                                                : <button onClick={() => startDeleteConfirm(item)} className="px-3 py-1.5 text-xs font-bold bg-red-50 text-red-400 hover:bg-red-100 hover:text-red-600 rounded border border-red-200" title="削除">🗑️ 削除</button>
                                            }
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-xl text-sm whitespace-pre-wrap mb-4">{safeContent}</div>
                                    {item.stakeholders && (
                                        <div className="text-xs text-slate-500 font-bold mt-2">📞 {toSafeString(item.stakeholders)}</div>
                                    )}
                                    {item.fileLocation && (
                                        <div className="text-xs text-emerald-600 font-bold mt-1">📁 {toSafeString(item.fileLocation)}</div>
                                    )}

                                    {/* ★ インライン削除確認パネル */}
                                    {isConfirming && (
                                        <div className="mt-4 p-4 bg-red-50 border-2 border-red-200 rounded-2xl animate-pulse-once">
                                            <div className="flex items-center gap-2 mb-3">
                                                <span className="text-red-600 text-lg">⚠️</span>
                                                <p className="text-sm font-black text-red-700">本当に削除しますか？　この操作は取り消せません。</p>
                                            </div>
                                            <p className="text-xs text-red-500 font-bold mb-2">
                                                確認のため、タイトルの最初の {keyword.length} 文字「<span className="bg-red-100 px-1 rounded font-black text-red-700">{keyword}</span>」を入力してください
                                            </p>
                                            <div className="flex gap-2 items-center">
                                                <input
                                                    type="text"
                                                    value={deleteConfirm.inputValue}
                                                    onChange={e => setDeleteConfirm(prev => ({...prev, inputValue: e.target.value}))}
                                                    placeholder={`「${keyword}」と入力`}
                                                    className="flex-1 p-2 border-2 border-red-300 rounded-lg text-sm font-bold outline-none focus:border-red-500 bg-white"
                                                    autoFocus
                                                />
                                                <button
                                                    onClick={handleDeleteKnowledge}
                                                    disabled={!canDelete}
                                                    className="px-4 py-2 text-sm font-black rounded-lg transition-all disabled:opacity-30 disabled:cursor-not-allowed bg-red-600 text-white hover:bg-red-700 disabled:bg-red-300"
                                                >
                                                    削除する
                                                </button>
                                            </div>
                                            <p className="text-[10px] text-red-400 mt-2 font-bold">※ 10秒間操作がないと自動的にキャンセルされます</p>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    <AISummaryModal summaryConfig={summaryConfig} onClose={() => setSummaryConfig({isOpen: false})} />

                    {itemModal.isOpen && (() => {
                        const isEditing = !!itemModal.itemId;

                        // 変更差分を計算するヘルパー
                        const getDiff = () => {
                            if (!isEditing || !editOrigin) return [];
                            const fields = [
                                { key: 'title',        label: 'タイトル',       fmt: v => toSafeString(v) },
                                { key: 'visibility',   label: '公開範囲',       fmt: v => VIS_CONF[v||'public']?.label || v },
                                { key: 'category',     label: '分野',           fmt: v => v || '(未設定)' },
                                { key: 'timing',       label: '時期',           fmt: v => v || '(未設定)' },
                                { key: 'stakeholders', label: '関係先・連絡先', fmt: v => toSafeString(v) || '(未設定)' },
                                { key: 'fileLocation', label: 'ファイル場所',   fmt: v => toSafeString(v) || '(未設定)' },
                                { key: 'selectedTags', label: 'タグ',           fmt: v => (Array.isArray(v) && v.length > 0) ? v.join(', ') : '(なし)' },
                                { key: 'content',      label: '手順・内容',     fmt: v => { const s = toSafeString(v); return s.length > 80 ? s.slice(0, 80) + '…' : (s || '(未設定)'); } },
                            ];
                            return fields.map(f => {
                                const before = f.fmt(editOrigin[f.key]);
                                const after  = f.fmt(formData[f.key]);
                                return { ...f, before, after, changed: before !== after };
                            });
                        };

                        // 実際にFirestoreへ保存する処理
                        const commitSave = () => {
                            const p = {...formData, content: toSafeString(formData.content), updatedAt: firebase.firestore.FieldValue.serverTimestamp()};
                            const o = formData.originalVisibility || 'public', n = formData.visibility;
                            delete p.originalVisibility;
                            if (isEditing) {
                                if (o !== n) {
                                    db.collection(getColPath(cityId,schoolId,userId,'knowledge',o)).doc(itemModal.itemId).delete();
                                    db.collection(getColPath(cityId,schoolId,userId,'knowledge',n)).doc(itemModal.itemId).set(p);
                                } else {
                                    db.collection(getColPath(cityId,schoolId,userId,'knowledge',n)).doc(itemModal.itemId).update(p);
                                }
                            } else {
                                p.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                                db.collection(getColPath(cityId,schoolId,userId,'knowledge',n)).add(p);
                            }
                            setItemModal({isOpen:false, itemId:null});
                            setShowSaveConfirm(false);
                            setEditOrigin(null);
                        };

                        // 保存ボタン押下: 編集なら差分確認ステップへ / 新規ならそのまま保存
                        const handleSubmit = (e) => {
                            e.preventDefault();
                            if (isEditing) {
                                setShowSaveConfirm(true); // 確認ステップを表示
                            } else {
                                commitSave(); // 新規はそのまま保存
                            }
                        };

                        const diff = getDiff();
                        const changedFields = diff.filter(d => d.changed);

                        return (
                        <div className="fixed inset-0 bg-slate-900/70 flex items-center justify-center p-4 z-50 overflow-y-auto print-hidden">
                            <div className={`bg-white rounded-3xl w-full max-w-2xl p-8 my-8 transition-all ${showSaveConfirm ? 'border-t-8 border-amber-500' : 'border-t-8 border-emerald-600'}`}>

                                {/* ===== 通常の編集フォーム ===== */}
                                {!showSaveConfirm && (
                                <>
                                <h2 className="text-2xl font-black mb-6">{isEditing ? '✏️ 編集' : '✨ 新規作成'}</h2>
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="grid grid-cols-3 gap-2 bg-slate-50 p-2 rounded-xl">{Object.entries(VIS_CONF).map(([k, c]) => <label key={k} className="relative cursor-pointer"><input type="radio" checked={formData.visibility===k} onChange={()=>setFormData({...formData,visibility:k})} className="sr-only radio-card"/><div className="border-2 rounded-xl p-2 text-center text-sm font-bold">{c.label}</div></label>)}</div>
                                    <input value={toSafeString(formData.title)} onChange={e=>setFormData({...formData,title:e.target.value})} placeholder="タイトル *" className="w-full p-4 border-2 rounded-xl font-bold text-lg" required />
                                    <div className="grid grid-cols-2 gap-4"><div className="flex gap-1"><select value={formData.category} onChange={e=>setFormData({...formData,category:e.target.value})} className="w-full p-3 border-2 rounded-xl font-bold"><option value="">(指定なし)</option>{categories.map(c=><option key={c}>{c}</option>)}</select><button type="button" onClick={()=>setShowCatModal(true)} className="px-3 bg-slate-200 rounded-xl">⚙️</button></div><div className="flex gap-1"><select value={formData.timing} onChange={e=>setFormData({...formData,timing:e.target.value})} className="w-full p-3 border-2 rounded-xl font-bold"><option value="">(指定なし)</option>{timings.map(t=><option key={t}>{t}</option>)}</select><button type="button" onClick={()=>setShowTimeModal(true)} className="px-3 bg-slate-200 rounded-xl">⚙️</button></div></div>
                                    <div>
                                        <div className="flex justify-between items-end mb-1">
                                            <label className="text-sm font-bold text-slate-500">手順・内容</label>
                                            <button type="button" onClick={handleAIAssist} disabled={isAILoading} className="text-xs font-bold bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg border border-blue-200 hover:bg-blue-200 shadow-sm transition">
                                                {isAILoading ? '⏳ AIが思考中...' : '✨ AIで文章整理 ＆ 自動分類'}
                                            </button>
                                        </div>
                                        <textarea value={toSafeString(formData.content)} onChange={e=>setFormData({...formData,content:e.target.value})} placeholder="思いついたままベタ打ちして、AIボタンを押してみてください..." className="w-full p-4 border-2 rounded-xl h-48"></textarea>
                                    </div>
                                    <div className="p-4 border-2 border-dashed rounded-xl bg-slate-50"><div className="flex justify-between mb-2"><span className="text-sm font-bold text-slate-500">🏷️ タグ</span><button type="button" onClick={()=>setShowTagModal(true)} className="text-sm text-emerald-600 font-bold">⚙️ 編集</button></div><div className="flex flex-wrap gap-2">{tagsMaster.map(t=><button type="button" key={t} onClick={()=>setFormData({...formData,selectedTags:formData.selectedTags?.includes(t)?formData.selectedTags.filter(x=>x!==t):[...(formData.selectedTags||[]),t]})} className={`px-2 py-1 rounded text-xs font-bold border ${formData.selectedTags?.includes(t)?'bg-slate-700 text-white':'bg-white text-slate-500'}`}>{t}</button>)}</div></div>
                                    <div className="grid sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-sm font-bold text-slate-500 block mb-1">関係先・連絡先</label>
                                            <div className="flex gap-1">
                                                <select value={toSafeString(formData.stakeholders)} onChange={e=>setFormData({...formData,stakeholders:e.target.value})} className="w-full p-3 border-2 rounded-xl font-bold outline-none">
                                                    <option value="">(指定なし)</option>
                                                    {stakeholdersList.map(s=><option key={s} value={s}>{s}</option>)}
                                                </select>
                                                <button type="button" onClick={()=>setShowStakeholderModal(true)} className="px-3 bg-slate-200 rounded-xl font-bold hover:bg-slate-300">⚙️</button>
                                            </div>
                                        </div>
                                        <div><label className="text-sm font-bold text-slate-500 block mb-1">ファイル保管場所</label><input value={toSafeString(formData.fileLocation)} onChange={e=>setFormData({...formData,fileLocation:e.target.value})} placeholder="共有フォルダ等のパス" className="w-full p-3 border-2 rounded-xl text-emerald-600 outline-none" /></div>
                                    </div>
                                    <div className="flex gap-4 pt-4 border-t">
                                        <button type="button" onClick={()=>{setItemModal({isOpen:false});setEditOrigin(null);setShowSaveConfirm(false);}} className="flex-1 p-3 bg-slate-100 rounded-xl font-bold">キャンセル</button>
                                        <button type="submit" className="flex-1 p-3 bg-emerald-600 text-white rounded-xl font-bold">
                                            {isEditing ? '変更内容を確認する →' : '保存する'}
                                        </button>
                                    </div>
                                </form>
                                </>
                                )}

                                {/* ===== 変更確認ステップ (編集時のみ) ===== */}
                                {showSaveConfirm && (
                                <div>
                                    <div className="flex items-center gap-3 mb-2">
                                        <span className="text-3xl">📋</span>
                                        <div>
                                            <h2 className="text-2xl font-black text-amber-700">変更内容の確認</h2>
                                            <p className="text-sm text-slate-500 font-bold">以下の変更を保存してよいか確認してください</p>
                                        </div>
                                    </div>

                                    <div className="mt-5 rounded-2xl border-2 border-amber-200 overflow-hidden">
                                        {changedFields.length === 0 ? (
                                            <div className="p-6 text-center text-slate-500 font-bold bg-slate-50">
                                                <span className="text-3xl block mb-2">🔍</span>
                                                変更された項目はありません
                                            </div>
                                        ) : (
                                            <table className="w-full text-sm">
                                                <thead>
                                                    <tr className="bg-amber-50 border-b-2 border-amber-200">
                                                        <th className="text-left p-3 font-black text-amber-800 w-28">項目</th>
                                                        <th className="text-left p-3 font-black text-slate-500">変更前</th>
                                                        <th className="text-left p-3 font-black text-emerald-700">変更後</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {changedFields.map((f, i) => (
                                                        <tr key={f.key} className={`border-b border-amber-100 ${i % 2 === 0 ? 'bg-white' : 'bg-amber-50/30'}`}>
                                                            <td className="p-3 font-black text-slate-600 align-top">{f.label}</td>
                                                            <td className="p-3 align-top">
                                                                <span className="inline-block bg-red-50 text-red-700 rounded px-2 py-1 line-through text-xs font-bold whitespace-pre-wrap break-all">{f.before}</span>
                                                            </td>
                                                            <td className="p-3 align-top">
                                                                <span className="inline-block bg-emerald-50 text-emerald-800 rounded px-2 py-1 text-xs font-bold whitespace-pre-wrap break-all">{f.after}</span>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        )}
                                    </div>

                                    {changedFields.length > 0 && (
                                        <p className="mt-3 text-xs text-amber-700 font-bold bg-amber-50 p-3 rounded-xl border border-amber-200">
                                            ⚠️ 上記 <span className="text-amber-900">{changedFields.length}項目</span> が変更されます。この操作は取り消せません。
                                        </p>
                                    )}

                                    <div className="flex gap-4 mt-6 pt-4 border-t">
                                        <button
                                            type="button"
                                            onClick={() => setShowSaveConfirm(false)}
                                            className="flex-1 p-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-bold text-slate-700"
                                        >
                                            ← 編集に戻る
                                        </button>
                                        <button
                                            type="button"
                                            onClick={commitSave}
                                            disabled={changedFields.length === 0}
                                            className="flex-1 p-3 bg-amber-500 hover:bg-amber-600 text-white rounded-xl font-black shadow-md disabled:opacity-40 disabled:cursor-not-allowed"
                                        >
                                            ✅ 確定して保存する
                                        </button>
                                    </div>
                                </div>
                                )}
                            </div>
                        </div>
                        );
                    })()}
                    {showCatModal && <SettingModal title="分野" items={categories} newItem={newCat} setNewItem={setNewCat} onAdd={()=>{if(newCat.trim())db.collection(`cities/${cityId}/settings`).doc('knowledge_categories').set({list:[...new Set([...categories,newCat.trim()])]},{merge:true});setNewCat('');}} onRemove={c=>{if(window.confirm('削除しますか？'))db.collection(`cities/${cityId}/settings`).doc('knowledge_categories').set({list:categories.filter(x=>x!==c)},{merge:true});}} onClose={()=>setShowCatModal(false)} />}
                    {showTimeModal && <SettingModal title="時期" items={timings} newItem={newTime} setNewItem={setNewTime} onAdd={()=>{if(newTime.trim())db.collection(`cities/${cityId}/settings`).doc('knowledge_timings').set({list:[...new Set([...timings,newTime.trim()])]},{merge:true});setNewTime('');}} onRemove={t=>{if(window.confirm('削除しますか？'))db.collection(`cities/${cityId}/settings`).doc('knowledge_timings').set({list:timings.filter(x=>x!==t)},{merge:true});}} onClose={()=>setShowTimeModal(false)} />}
                    {showTagModal && <SettingModal title="タグ" items={tagsMaster} newItem={newTag} setNewItem={setNewTag} onAdd={()=>{if(newTag.trim())db.collection(`cities/${cityId}/settings`).doc('knowledge_tags').set({list:[...new Set([...tagsMaster,newTag.trim()])]},{merge:true});setNewTag('');}} onRemove={t=>{if(window.confirm('削除しますか？'))db.collection(`cities/${cityId}/settings`).doc('knowledge_tags').set({list:tagsMaster.filter(x=>x!==t)},{merge:true});}} onClose={()=>setShowTagModal(false)} />}
                    {showStakeholderModal && <SettingModal title="関係先・連絡先" items={stakeholdersList} newItem={newStakeholder} setNewItem={setNewStakeholder} onAdd={()=>{if(newStakeholder.trim())db.collection(`cities/${cityId}/settings`).doc('knowledge_stakeholders').set({list:[...new Set([...stakeholdersList,newStakeholder.trim()])]},{merge:true});setNewStakeholder('');}} onRemove={s=>{if(window.confirm('削除しますか？'))db.collection(`cities/${cityId}/settings`).doc('knowledge_stakeholders').set({list:stakeholdersList.filter(x=>x!==s)},{merge:true});}} onClose={()=>setShowStakeholderModal(false)} />}
                </div>
            );
        }

        // ==========================================
        // App全体
        // ==========================================
        function App() {
            const [cityId, setCityId] = useState(localStorage.getItem('hn_cityId') || '');
            const [schoolId, setSchoolId] = useState(localStorage.getItem('hn_schoolId') || '');
            const [userId, setUserId] = useState(localStorage.getItem('hn_userId') || '');
            const [activeTab, setActiveTab] = useState('tasks');
            const [printConfig, setPrintConfig] = useState(null);
            const [showApiModal, setShowApiModal] = useState(false);
            const [showAdminModal, setShowAdminModal] = useState(false);

            useEffect(() => { if (printConfig) setTimeout(() => window.print(), 300); }, [printConfig]);
            useEffect(() => { const h = () => setPrintConfig(null); window.addEventListener('afterprint', h); return () => window.removeEventListener('afterprint', h); }, []);

            if (!cityId || !schoolId || !userId) return <LoginScreen onLogin={(c, s, u) => { localStorage.setItem('hn_cityId', c); localStorage.setItem('hn_schoolId', s); localStorage.setItem('hn_userId', u); setCityId(c); setSchoolId(s); setUserId(u); }} />;
            
            if (printConfig) {
                if (printConfig.type === 'task') return <TaskPrintView data={printConfig.data} />;
                if (printConfig.type === 'knowledge') return <KnowledgePrintView data={printConfig.data} />;
                if (printConfig.type === 'knowledge_all') return <KnowledgeAllPrintView items={printConfig.items} cityId={cityId} schoolId={schoolId} exportDate={printConfig.exportDate} />;
            }

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 print-hidden">
                    <header className="mb-8 max-w-4xl mx-auto">
                        <div className="flex justify-between items-end mb-6">
                            <div><h1 className="text-3xl font-black text-emerald-700">HasuNet_Task＆Knowledge</h1><p className="text-sm font-bold text-slate-500 mt-1">🏢 {cityId} / 🏫 {schoolId} / 👤 {userId}</p></div>
                            <div className="flex gap-2">
                                <button onClick={() => setShowApiModal(true)} className="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-2 border border-blue-200 rounded-lg shadow-sm">⚙️ AI設定</button>
                                <button onClick={() => setShowAdminModal(true)} className="text-sm font-bold text-slate-600 bg-slate-50 px-3 py-2 border border-slate-200 rounded-lg shadow-sm">🔧 管理者</button>
                                <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="text-sm font-bold text-slate-400 bg-white px-3 py-2 border rounded-lg shadow-sm">退出</button>
                            </div>
                        </div>
                        <div className="flex gap-2 bg-slate-200/50 p-1.5 rounded-2xl">
                            <button onClick={() => setActiveTab('tasks')} className={`flex-1 py-3 rounded-xl font-black transition ${activeTab==='tasks'?'bg-white text-emerald-700 shadow-sm':'text-slate-500'}`}>📋 タスクボード</button>
                            <button onClick={() => setActiveTab('knowledge')} className={`flex-1 py-3 rounded-xl font-black transition ${activeTab==='knowledge'?'bg-white text-emerald-700 shadow-sm':'text-slate-500'}`}>📚 ナレッジベース</button>
                        </div>
                    </header>
                    {activeTab === 'tasks' ? <TaskBoard cityId={cityId} schoolId={schoolId} userId={userId} onPrint={(data) => setPrintConfig({ type: 'task', data })} /> : <KnowledgeTab cityId={cityId} schoolId={schoolId} userId={userId} onPrint={(data) => setPrintConfig({ type: 'knowledge', data })} onPrintAll={(items) => setPrintConfig({ type: 'knowledge_all', items, exportDate: new Date().toLocaleDateString('ja-JP') })} />}
                    {showApiModal && <ApiKeyModal cityId={cityId} onClose={() => setShowApiModal(false)} />}
                    {showAdminModal && <AdminModal cityId={cityId} onClose={() => setShowAdminModal(false)} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
