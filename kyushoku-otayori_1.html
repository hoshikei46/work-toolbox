<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>給食おたよりメーカー Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    @media print {
      @page { size: B5 portrait; margin: 0; }
      body { background: white !important; margin: 0; padding: 0; }
      #printable-area { 
        width: 182mm !important; 
        min-height: 257mm !important; 
        padding: 10mm !important; 
        margin: 0 !important;
        border: none !important;
        box-shadow: none !important;
      }
    }

    .preview-container {
      background-color: #e5e7eb;
      padding: 40px 20px;
      overflow-y: auto;
      display: flex;
      justify-content: center;
    }

    #printable-area {
      background-color: white;
      width: 182mm;
      min-height: 257mm;
      padding: 10mm;
      box-sizing: border-box;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      position: relative;
      color: black;
    }

    #printable-area::after {
      content: "--- 1ページ目の下端 (B5) ---";
      position: absolute;
      top: 257mm;
      left: 0;
      width: 100%;
      border-top: 2px dashed #ff4444;
      color: #ff4444;
      font-size: 10px;
      text-align: center;
      pointer-events: none;
      display: block;
    }

    .unified-text { 
      font-size: var(--font-size, 12.5pt); 
      line-height: 2.0; 
      word-break: break-all;
    }
    .unified-text ruby { ruby-align: center; ruby-position: over; }
    .unified-text rt { font-size: 0.6em; color: #333; line-height: 1; transform: translateY(-10%); }
  </style>
</head>
<body class="bg-orange-50 font-sans text-gray-800 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyBA4GCW-DXP2SenQBotyF0G5PVZ5IPrpTc",
      authDomain: "work-stock-app.firebaseapp.com",
      projectId: "work-stock-app",
      storageBucket: "work-stock-app.firebasestorage.app",
      messagingSenderId: "283214115928",
      appId: "1:283214115928:web:0a8408714655fc9d55062d"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const defaultTemplates = {
      1: "食べる時の姿勢も大切です。背中をまっすぐ伸ばして、食器をきちんと持って食べると、消化も良くなりますよ。\nそれでは、おいしくいただきましょう。",
      2: "食事をするときは、「よくかむ」ことを意識してみましょう。しっかりかんで、味わってみてください。\nそれでは、おいしくいただきましょう。",
      3: "給食はいつも、赤色、黄色、緑色の栄養がそろうように作られています。苦手なものも、ひとくちだけでもチャレンジして、バランスよく食べましょう。\nそれでは、おいしくいただきましょう。",
      4: "今日の給食も、給食室の調理員さんたちが、朝早くから一生懸命つくってくれました。感謝の気持ちをこめて、残さずいただきましょう。\nそれでは、おいしくいただきましょう。",
      5: "今日で今週の給食は終わりです。明日からの週末も、お家でしっかり食事をとり、元気にすごしてください。\nそれでは、おいしくいただきましょう。"
    };

    function App() {
      const [apiKey, setApiKey] = useState('');
      const [modelName, setModelName] = useState('gemini-1.5-flash');
      const [showSettings, setShowSettings] = useState(false);
      const [showTemplateSettings, setShowTemplateSettings] = useState(false);
      const [templates, setTemplates] = useState(defaultTemplates);
      
      const getTodayJST = () => {
        const now = new Date();
        const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
        return jst.toISOString().split('T')[0];
      };
      const [date, setDate] = useState(getTodayJST());
      const [menu, setMenu] = useState('');
      const [themes, setThemes] = useState(['', '', '']);
      const [memo, setMemo] = useState('');
      const [rubyMenu, setRubyMenu] = useState('');
      const [rubyMemo, setRubyMemo] = useState('');

      const [fontSize, setFontSize] = useState(12.5);
      const [isLoading, setIsLoading] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [aiOptions, setAiOptions] = useState([]);
      const [showOptionsModal, setShowOptionsModal] = useState(false);
      const [activeTab, setActiveTab] = useState('edit');
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        const storedKey = localStorage.getItem('gemini_api_key');
        const storedModel = localStorage.getItem('gemini_model_name');
        const storedTemplates = localStorage.getItem('kyushoku_templates');
        if (storedKey) setApiKey(storedKey);
        if (storedModel) setModelName(storedModel);
        if (storedTemplates) setTemplates(JSON.parse(storedTemplates));
      }, []);

      useEffect(() => {
        const loadData = async () => {
          const doc = await db.collection("lunch_newsletters").doc(date).get();
          if (doc.exists) {
            const data = doc.data();
            setMenu(data.menu || "");
            setThemes(data.themes || [data.theme || "", "", ""]);
            setMemo(data.memo || "");
            setRubyMenu(data.rubyMenu || "");
            setRubyMemo(data.rubyMemo || "");
          } else {
            setMenu(""); setThemes(["", "", ""]); setMemo(""); setRubyMenu(""); setRubyMemo("");
          }
        };
        loadData();
      }, [date]);

      const exportToCSV = async () => {
        const snapshot = await db.collection("lunch_newsletters").get();
        if (snapshot.empty) { alert("データがありません"); return; }
        const rows = [["id", "menu", "themes", "memo", "rubyMenu", "rubyMemo"]];
        snapshot.forEach(doc => {
          const d = doc.data();
          rows.push([doc.id, d.menu, JSON.stringify(d.themes || []), d.memo, d.rubyMenu, d.rubyMemo]);
        });
        const csvContent = rows.map(r => r.map(c => `"${(c||"").replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `給食おたよりバックアップ_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
      };

      const importFromCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (event) => {
          const lines = event.target.result.split("\n").slice(1);
          for (let line of lines) {
            const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').replace(/""/g, '"'));
            if (cols[0]) {
              await db.collection("lunch_newsletters").doc(cols[0]).set({
                menu: cols[1], themes: JSON.parse(cols[2] || "[]"), memo: cols[3], rubyMenu: cols[4], rubyMemo: cols[5]
              });
            }
          }
          alert("インポート完了");
          location.reload();
        };
        reader.readAsText(file);
      };

      // 消去処理
      const clearData = async () => {
        if (!window.confirm(`${formatDate(date)} の内容をすべて消去しますか？\nこの操作は元に戻せません。`)) return;
        setMenu(''); setThemes(['', '', '']); setMemo(''); setRubyMenu(''); setRubyMemo('');
        try {
          await db.collection("lunch_newsletters").doc(date).delete();
        } catch (e) {
          // ローカルのみ消去でも続行
        }
      };

      // 保存処理（silent=trueの場合はアラートなし）
      const saveToFirebase = async (silent = false) => {
        setIsSaving(true);
        try {
          await db.collection("lunch_newsletters").doc(date).set({ menu, themes, memo, rubyMenu, rubyMemo });
          if (!silent) alert("保存完了");
          return true;
        } catch (e) {
          if (!silent) alert("保存失敗");
          return false;
        } finally {
          setIsSaving(false);
        }
      };

      // 印刷前にクラウド自動保存してから印刷
      const handlePrint = async () => {
        setIsSaving(true);
        let saved = false;
        try {
          await db.collection("lunch_newsletters").doc(date).set({ menu, themes, memo, rubyMenu, rubyMemo });
          saved = true;
        } catch (e) {
          const proceed = window.confirm("クラウド保存に失敗しました。それでも印刷しますか？");
          if (!proceed) { setIsSaving(false); return; }
        }
        setIsSaving(false);

        const printContent = document.getElementById("printable-area").innerHTML;
        document.body.innerHTML = `<div style="width: 182mm; padding: 10mm; box-sizing: border-box; background: white; color: black; --font-size: ${fontSize}pt;">${printContent}</div>`;
        window.print();
        location.reload();
      };

      const generateMemoWithAI = async () => {
        if (!apiKey) { setShowSettings(true); return; }
        setIsLoading(true);
        // ★ です・ます調を明示
        const themeInstructions = [0,1,2].map(i => themes[i] ? `案${i+1}のテーマは「${themes[i]}」` : `案${i+1}はテーマなしで自由に`).join('、');
        const prompt = `小学校の栄養教諭として、給食ひとくちメモを100〜150文字程度で【3パターン】作成してください。文体は必ずです・ます調（丁寧語）で統一してください。${themeInstructions}。形式：【案1】文章===【案2】文章===【案3】文章\n献立名: ${menu}`;
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          const data = await res.json();
          const splitOptions = data.candidates[0].content.parts[0].text.split('===').map(t => t.replace(/【案\d】/g, '').trim());
          setAiOptions(splitOptions);
          setShowOptionsModal(true);
        } catch (e) { alert("AIエラー"); }
        setIsLoading(false);
      };

      const applyRubyWithAI = async () => {
        setIsLoading(true);
        const prompt = `全ての漢字にHTMLの<ruby>タグでふりがなを振れ。間に===を挟め。\n${menu}\n===\n${memo}`;
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          const data = await res.json();
          const parts = data.candidates[0].content.parts[0].text.split('===');
          setRubyMenu(parts[0].trim());
          setRubyMemo(parts[1].trim().replace(/\n/g, '<br />　'));
        } catch (e) { alert("ふりがなエラー"); }
        setIsLoading(false);
      };

      const formatDate = (dStr) => {
        const d = new Date(dStr);
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        return `${d.getMonth() + 1}月${d.getDate()}日（${days[d.getDay()]}）`;
      };

      const fullHtml = `　<ruby>給食<rt>きゅうしょく</rt></ruby>の<ruby>時間<rt>じかん</rt></ruby>になりました。<br /><br />　みなさん、<ruby>食器<rt>しょっき</rt></ruby>やはしの<ruby>向<rt>む</rt></ruby>きは、あっていますか？ <ruby>食<rt>た</rt></ruby>べものや、つくってくれた<ruby>人<rt>ひと</rt></ruby>たちに<ruby>感謝<rt>かんしゃ</rt></ruby>の<ruby>気持<rt>きも</rt></ruby>ちをこめて、<ruby>食事<rt>しょくじ</rt></ruby>のあいさつをしましょう。<br /><br />　<ruby>今日<rt>きょう</rt></ruby>のメニューは、 ${rubyMenu || menu || "（献立名）"} です。<br /><br />　${rubyMemo || (memo ? memo.replace(/\n/g, '<br />　') : "（ここにAIが作成した本文が入ります）")}`;

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>
          <header className="bg-orange-600 text-white p-3 shadow-md flex justify-between items-center z-10" style={{ flexShrink: 0 }}>
            <h1 className="text-lg font-bold">🍲 おたよりメーカー Pro</h1>
            <div className="flex gap-2">
              <button onClick={exportToCSV} className="bg-orange-700 px-2 py-1 rounded text-xs">📥 保存Excel</button>
              <label className="bg-orange-700 px-2 py-1 rounded text-xs cursor-pointer">📤 読込Excel<input type="file" accept=".csv" onChange={importFromCSV} className="hidden" /></label>
              <button onClick={() => setShowTemplateSettings(true)} className="bg-orange-700 px-2 py-1 rounded text-xs">📝 定型文</button>
              <button onClick={() => setShowSettings(true)} className="bg-orange-700 px-2 py-1 rounded text-xs">⚙️ 設定</button>
            </div>
          </header>

          {/* スマホ用タブ切替バー */}
          <div className="md:hidden flex border-b bg-white" style={{ flexShrink: 0 }}>
            <button
              onClick={() => setActiveTab('edit')}
              className={"flex-1 py-2 text-sm font-bold " + (activeTab === 'edit' ? 'border-b-2 border-orange-500 text-orange-600' : 'text-gray-400')}
            >✏️ 編集</button>
            <button
              onClick={() => setActiveTab('preview')}
              className={"flex-1 py-2 text-sm font-bold " + (activeTab === 'preview' ? 'border-b-2 border-orange-500 text-orange-600' : 'text-gray-400')}
            >👁️ プレビュー</button>
          </div>

          <main style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
            {/* 編集パネル（PC:50% / スマホ:タブ切替） */}
            <section
              style={{
                width: isMobile ? '100%' : '50%',
                overflowY: 'auto',
                borderRight: '1px solid #e5e7eb',
                display: isMobile && activeTab === 'preview' ? 'none' : 'block'
              }}
              className="bg-white p-5 shadow-inner" 
            >
              <div className="space-y-4">
                <div>
                  <div className="flex justify-between items-center mb-1 text-sm font-bold">
                    <label>日付</label>
                    <div className="flex gap-1">
                      <button onClick={() => setDate(new Date(new Date(date).getTime() - 86400000).toISOString().split('T')[0])} className="bg-orange-100 px-2 py-1 rounded text-[10px]">前日</button>
                      <button onClick={() => setDate(new Date(new Date(date).getTime() + 86400000).toISOString().split('T')[0])} className="bg-orange-100 px-2 py-1 rounded text-[10px]">翌日</button>
                    </div>
                  </div>
                  <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full p-2 border rounded text-sm" />
                </div>
                <div>
                  <label className="text-sm font-bold">献立名</label>
                  <textarea value={menu} onChange={(e) => {setMenu(e.target.value); setRubyMenu('');}} className="w-full p-2 border rounded h-16 text-sm" />
                </div>
                <div>
                  <label className="text-sm font-bold">テーマ（各案ごとに任意）</label>
                  {[0,1,2].map(i => (
                    <div key={i} className="flex items-center gap-2 mt-1">
                      <span className="text-xs text-orange-600 font-bold whitespace-nowrap">案{i+1}</span>
                      <input type="text" value={themes[i]} onChange={(e) => { const t = [...themes]; t[i] = e.target.value; setThemes(t); }} placeholder="例: かむこと、旬の野菜" className="w-full p-2 border rounded text-sm" />
                    </div>
                  ))}
                </div>
                <button onClick={generateMemoWithAI} disabled={isLoading || !menu} className="w-full py-2 bg-orange-500 text-white rounded font-bold text-sm shadow">
                  {isLoading ? 'AI考え中...' : '🤖 AI案を3つ作成（です・ます調）'}
                </button>
                <div className="pt-2 border-t mt-2">
                  <label className="text-sm font-bold">本文調整</label>
                  <textarea value={memo} onChange={(e) => {setMemo(e.target.value); setRubyMemo('');}} className="w-full p-2 border rounded h-32 text-xs bg-yellow-50 mt-1" />
                </div>
                <div className="pt-4 space-y-2 border-t">
                  <div className="flex justify-between text-xs font-bold">
                    <span>フォントサイズ</span>
                    <span>{fontSize}pt</span>
                  </div>
                  <input type="range" min="8" max="18" step="0.5" value={fontSize} onChange={(e) => setFontSize(e.target.value)} className="w-full accent-orange-500" />
                  <button onClick={applyRubyWithAI} className="w-full py-2 bg-green-600 text-white rounded font-bold text-sm">✨ ふりがなを振る</button>
                  <div className="flex gap-2">
                    <button onClick={() => saveToFirebase(false)} disabled={isSaving} className="flex-1 py-2 bg-blue-600 text-white rounded font-bold text-sm shadow">
                      {isSaving ? '保存中...' : '💾 保存'}
                    </button>
                    <button onClick={handlePrint} disabled={isSaving} className="flex-1 py-2 bg-gray-800 text-white rounded font-bold text-sm shadow">
                      {isSaving ? '保存中...' : '🖨️ 印刷'}
                    </button>
                  </div>
                  <button onClick={clearData} className="w-full py-2 bg-red-100 text-red-600 border border-red-300 rounded font-bold text-sm hover:bg-red-200">
                    🗑️ この日の内容を消去
                  </button>
                  <p className="text-[10px] text-gray-400 text-center">※ 印刷時はクラウドへ自動保存されます</p>
                </div>
              </div>
            </section>

            {/* プレビュー画面（PC:50% / スマホ:タブ切替） */}
            <section
              style={{
                width: isMobile ? '100%' : '50%',
                overflowY: 'auto',
                display: isMobile && activeTab === 'edit' ? 'none' : 'flex'
              }}
              className="preview-container" 
            >
              <div id="printable-area" style={{ '--font-size': `${fontSize}pt` }}>
                <div className="flex justify-between items-end border-b-2 border-black pb-1 mb-4">
                  <h2 className="text-xl font-bold">給食ひとくちおたより</h2>
                  <p className="text-lg font-bold">{formatDate(date)}</p>
                </div>
                <div className="unified-text" dangerouslySetInnerHTML={{ __html: fullHtml }} />
              </div>
            </section>
          </main>

          {/* AIローディングポップアップ */}
          {isLoading && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
              <div className="bg-white rounded-3xl p-8 shadow-2xl flex flex-col items-center gap-4" style={{ minWidth: "260px" }}>
                <div style={{ fontSize: "56px", animation: "popbounce 0.8s infinite alternate" }}>🍱</div>
                <div className="flex gap-2">
                  {[0,1,2].map(i => (
                    <div key={i} style={{
                      width: "10px", height: "10px", borderRadius: "50%",
                      backgroundColor: "#f97316",
                      animation: `popbounce 0.6s ${i * 0.2}s infinite alternate`
                    }} />
                  ))}
                </div>
                <p className="text-orange-500 font-bold text-sm">AIが考え中です…</p>
                <p className="text-gray-400 text-xs">おいしいメモを作っています 🌟</p>
              </div>
              <style>{`
                @keyframes popbounce {
                  from { transform: translateY(0px); }
                  to { transform: translateY(-12px); }
                }
              `}</style>
            </div>
          )}

          {/* モーダル類 */}
          {showOptionsModal && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl p-5 w-full max-w-5xl shadow-2xl">
                <h3 className="font-bold mb-4 text-center">AIが作成した3つの案（選ぶと本文に反映されます）</h3>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  {aiOptions.map((opt, i) => (
                    <div key={i} className="bg-orange-50 p-4 rounded border border-orange-200 flex flex-col h-full">
                      <p className="text-xs leading-relaxed flex-1 mb-4 whitespace-pre-wrap">{opt}</p>
                      <button onClick={() => {setMemo(opt + "\n\n" + templates[new Date(date).getDay()]); setRubyMemo(''); setShowOptionsModal(false);}} className="w-full bg-orange-500 text-white py-2 rounded font-bold text-sm">この案を採用</button>
                    </div>
                  ))}
                </div>
                <button onClick={() => setShowOptionsModal(false)} className="w-full mt-4 py-2 bg-gray-200 rounded font-bold">閉じる</button>
              </div>
            </div>
          )}

          {showTemplateSettings && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl p-5 w-full max-w-lg shadow-2xl">
                <h3 className="font-bold mb-3">曜日ごとの定型文設定</h3>
                <div className="space-y-2 max-h-[60vh] overflow-y-auto pr-2">
                  {[1,2,3,4,5].map(day => (
                    <div key={day}>
                      <label className="text-[10px] font-bold text-orange-700">{['日','月','火','水','木','金','土'][day]}曜日</label>
                      <textarea value={templates[day]} onChange={(e) => setTemplates({...templates, [day]: e.target.value})} className="w-full p-2 border rounded h-20 text-xs bg-orange-50" />
                    </div>
                  ))}
                </div>
                <button onClick={() => {localStorage.setItem('kyushoku_templates', JSON.stringify(templates)); setShowTemplateSettings(false);}} className="w-full py-2 bg-orange-600 text-white rounded mt-4 font-bold">設定を保存</button>
              </div>
            </div>
          )}

          {showSettings && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
              <div className="bg-white p-6 rounded-xl w-80 shadow-2xl">
                <h3 className="font-bold mb-4">API設定</h3>
                <label className="text-xs font-bold text-gray-600">Gemini API Key</label>
                <input type="password" placeholder="APIキーを入力" value={apiKey} onChange={(e) => {setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value);}} className="w-full p-2 border rounded mb-3 text-sm" />
                <label className="text-xs font-bold text-gray-600">モデル名</label>
                <input type="text" placeholder="例: gemini-1.5-flash" value={modelName} onChange={(e) => {setModelName(e.target.value); localStorage.setItem('gemini_model_name', e.target.value);}} className="w-full p-2 border rounded mb-4 text-sm" />
                <p className="text-[10px] text-gray-400 mb-4">例: gemini-1.5-flash / gemini-1.5-pro / gemini-2.0-flash</p>
                <button onClick={() => setShowSettings(false)} className="w-full py-2 bg-orange-600 text-white rounded font-bold">閉じる</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
